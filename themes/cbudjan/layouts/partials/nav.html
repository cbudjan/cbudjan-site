<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <a href="{{ "/" | relURL }}" class="nav-logo" aria-label="{{ .Site.Title }} home">
    <img src="/img/logo.png" alt="{{ .Site.Title }}">
  </a>

  <button class="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>

  <ul class="nav-links" id="nav-menu" role="list">
    {{ range .Site.Menus.main }}
    <li>
      <a href="{{ .URL | relURL }}"
         {{ if $.IsMenuCurrent "main" . }}class="active" aria-current="page"{{ end }}>
        {{ .Name }}
      </a>
    </li>
    {{ end }}
  </ul>
</nav>

<script>
  // Mobile menu toggle
  document.querySelector('.nav-toggle')?.addEventListener('click', function() {
    const expanded = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', !expanded);
    document.getElementById('nav-menu')?.classList.toggle('open');
  });
</script>

name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]        # runs on every push to main
  workflow_dispatch:         # also allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel any in-progress run if a new push arrives
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true          # needed for SCSS/asset pipeline

      - name: Build
        # Using the github.io URL while DNS cutover to cbudjan.com is pending.
        # Once DNS is live, change this to: hugo --minify --baseURL "https://cbudjan.com/"
        run: hugo --minify --baseURL "https://cbudjan.github.io/cbudjan-site/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
